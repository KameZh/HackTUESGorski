<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — Gorski Finance</title>
    <meta name="description" content="Create your free Gorski Finance account and start tracking your finances today." />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="./img/gorsko-logo.png" type="image/x-icon" />
  </head>
  <body>
    <!-- HEADER -->
    <header id="mainHeader">
      <a href="index.html" class="logo">
        <img src="./img/gorsko-logo.png" alt="Gorski Logo" class="logo-img" />
        <div class="logo-text">
          <span class="brand">Gorski</span>
          <span class="sub">Finance</span>
        </div>
      </a>
      <nav class="menu">
        <a href="index.html" title="Home"><img src="./img/home.png" alt="Home" /></a>
        <a href="calc.html" title="Calculator"><img src="./img/calc.png" alt="Calculator" /></a>
        <a href="achv.html" title="Achievements"><img src="./img/trophy.png" alt="Achievements" /></a>
        <a href="gemini.html" title="AI Chat"><img src="./img/gemini.png" alt="AI Chat" /></a>
        <a href="contact.html" title="Contact"><img src="./img/contacts.png" alt="Contact" /></a>
        <a id="loginLink" href="/login.html" title="Login"><img src="./img/login.png" alt="Login" /></a>
      </nav>
    </header>

    <!-- AUTH AREA -->
    <div class="auth-page">
      <form id="signupForm" action="/signup.html" method="post">
        <div class="auth-logo">
          <img src="./img/gorsko-logo.png" alt="Gorski Finance Logo" />
          <h2>Create Account</h2>
          <p>Join Gorski Finance — it's completely free</p>
        </div>

        <div id="notification" class="notification"></div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create a password" required autocomplete="new-password" />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password" />
        </div>

        <div class="auth-divider">By registering you agree to our <a href="t&c.html">Terms &amp; Conditions</a></div>

        <button type="submit" style="width:100%;">Create Account →</button>

        <div class="auth-link">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </form>
    </div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-content">
        © 2025 Gorski Finance &nbsp;|&nbsp;
        <a href="mailto:gorskite4@gmail.com">gorskite4@gmail.com</a>
      </div>
      <nav class="footer-menu">
        <a href="index.html">Home</a>
        <a href="calc.html">Calculator</a>
        <a href="achv.html">Achievements</a>
        <a href="gemini.html">AI Chat</a>
        <a href="contact.html">Contact</a>
      </nav>
    </footer>

    <script>
      window.addEventListener('scroll', function () {
        document.getElementById('mainHeader').classList.toggle('scrolled', window.scrollY > 50);
      });

      // Signup form submit (original logic preserved)
      document.getElementById('signupForm').onsubmit = async function (event) {
        event.preventDefault();
        const formData = new FormData(this);
        const password        = formData.get('password');
        const confirmPassword = formData.get('confirmPassword');

        if (password !== confirmPassword) {
          const notification = document.getElementById('notification');
          notification.innerText = 'Passwords do not match';
          notification.className = 'notification error';
          notification.style.display = 'block';
          return;
        }

        const data = {
          username: formData.get('username'),
          password: password,
        };

        const response = await fetch(this.action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const text = await response.text();
        const notification = document.getElementById('notification');
        notification.innerText = text;
        if (response.status === 200) {
          notification.className = 'notification success';
          setTimeout(() => { window.location.href = '/login.html'; }, 1500);
        } else {
          notification.className = 'notification error';
        }
        notification.style.display = 'block';
      };

      // Live password match feedback
      document.getElementById('confirmPassword').addEventListener('input', function () {
        const password        = document.getElementById('password').value;
        const confirmPassword = this.value;
        const notification    = document.getElementById('notification');
        if (confirmPassword === '') {
          notification.style.display = 'none';
        } else if (password !== confirmPassword) {
          notification.innerText = 'Passwords do not match';
          notification.className = 'notification error';
          notification.style.display = 'block';
        } else {
          notification.innerText = 'Passwords match ✓';
          notification.className = 'notification success';
          notification.style.display = 'block';
        }
      });

      document.getElementById('password').addEventListener('input', function () {
        const confirmPassword = document.getElementById('confirmPassword');
        if (confirmPassword.value !== '') {
          confirmPassword.dispatchEvent(new Event('input'));
        }
      });
    </script>
  </body>
</html>
