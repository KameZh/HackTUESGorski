<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Gorski Finance</title>
    <meta name="description" content="Sign in to your Gorski Finance account." />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="./img/gorsko-logo.png" type="image/x-icon" />
  </head>
  <body>
    <!-- HEADER -->
    <header id="mainHeader">
      <a href="index.html" class="logo">
        <img src="./img/gorsko-logo.png" alt="Gorski Logo" class="logo-img" />
        <div class="logo-text">
          <span class="brand">Gorski</span>
          <span class="sub">Finance</span>
        </div>
      </a>
      <nav class="menu">
        <a href="index.html" title="Home"><img src="./img/home.png" alt="Home" /></a>
        <a href="calc.html" title="Calculator"><img src="./img/calc.png" alt="Calculator" /></a>
        <a href="achv.html" title="Achievements"><img src="./img/trophy.png" alt="Achievements" /></a>
        <a href="gemini.html" title="AI Chat"><img src="./img/gemini.png" alt="AI Chat" /></a>
        <a href="contact.html" title="Contact"><img src="./img/contacts.png" alt="Contact" /></a>
        <a id="loginLink" href="/login.html" class="active" title="Login"><img src="./img/login.png" alt="Login" /></a>
      </nav>
    </header>

    <!-- AUTH AREA -->
    <div class="auth-page">
      <form id="loginForm" action="/login.html" method="post">
        <!-- Logo inside form -->
        <div class="auth-logo">
          <img src="./img/gorsko-logo.png" alt="Gorski Finance Logo" />
          <h2>Welcome back</h2>
          <p>Sign in to your Gorski Finance account</p>
        </div>

        <div id="notification" class="notification"></div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password" />
        </div>

        <button type="submit" style="width:100%; margin-top:8px;">Sign In →</button>

        <div class="auth-link">
          Don't have an account? <a href="signup.html">Create one</a>
        </div>
      </form>
    </div>

    <!-- FOOTER -->
    <footer>
      <div class="footer-content">
        © 2025 Gorski Finance &nbsp;|&nbsp;
        <a href="mailto:gorskite4@gmail.com">gorskite4@gmail.com</a>
      </div>
      <nav class="footer-menu">
        <a href="index.html">Home</a>
        <a href="calc.html">Calculator</a>
        <a href="achv.html">Achievements</a>
        <a href="gemini.html">AI Chat</a>
        <a href="contact.html">Contact</a>
      </nav>
    </footer>

    <script>
      window.addEventListener('scroll', function () {
        document.getElementById('mainHeader').classList.toggle('scrolled', window.scrollY > 50);
      });

      // If already logged in, redirect to profile
      fetch('/api/session')
        .then(response => response.json())
        .then(data => {
          if (data.userId) {
            window.location.href = '/profile.html';
          }
        })
        .catch(error => console.error('Session check error:', error));

      // Login form submit (original logic preserved)
      document.getElementById('loginForm').onsubmit = async function (event) {
        event.preventDefault();
        const formData = new FormData(this);
        const data = {
          username: formData.get('username'),
          password: formData.get('password'),
        };

        const response = await fetch(this.action, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const notification = document.getElementById('notification');
        try {
          const responseData = await response.json();
          if (response.ok && responseData.success) {
            notification.innerText = 'Успешен вход! Пренасочване...';
            notification.className = 'notification success';
            notification.style.display = 'block';
            setTimeout(() => { window.location.href = responseData.redirect; }, 1500);
          } else {
            notification.innerText = responseData.error || 'Грешка при влизане.';
            notification.className = 'notification error';
            notification.style.display = 'block';
          }
        } catch (error) {
          notification.innerText = 'Грешка при обработка на отговора.';
          notification.className = 'notification error';
          notification.style.display = 'block';
        }
      };
    </script>
  </body>
</html>
